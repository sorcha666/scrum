<!DOCTYPE html>
<html>
<head><title>Quiz Host</title></head>
<body>
<h1>Host View</h1>
<button onclick="socket.emit('host_start_game')">Start Game</button>
<button onclick="socket.emit('host_next_question')">Next Question</button>
<button onclick="socket.emit('host_show_leaderboard')">Leaderboard</button>
<button onclick="socket.emit('host_restart_game')">Restart</button>
<button onclick="socket.emit('host_skip_timer')">Skip Timer</button>

<div id="status"></div>
<div id="leaderboard"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
socket.on('state_update', state=>{
    document.getElementById('status').innerText=JSON.stringify({
        status:state.status,
        questionIndex:state.questionIndex,
        totalPlayers:state.totalPlayers,
        answersReceived:state.answersReceived,
        timeLeft:state.timeLeft
    },null,2);
    document.getElementById('leaderboard').innerHTML=state.leaderboard.map(p=>`${p.name}: ${p.score}`).join('<br>');
});
</script>
</body>
</html>
