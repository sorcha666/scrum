<!DOCTYPE html>
<html>
<head><title>Quiz Player</title></head>
<body>
<h1>Agile Quiz</h1>
<div>
  <input id="nameInput" placeholder="Enter your name or leave blank for Guest"/>
  <button onclick="joinGame()">Join</button>
</div>

<div id="quizArea" style="display:none">
  <h2 id="questionText"></h2>
  <div id="options"></div>
  <div>Time Left: <span id="timeLeft"></span></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myAnswer = null;

function joinGame(){
    const name = document.getElementById('nameInput').value;
    socket.emit('join_game', name);
    document.getElementById('quizArea').style.display='block';
}

socket.on('state_update', state => {
    const q = state.question;
    if(!q) return;
    document.getElementById('questionText').innerText=q.text;
    const optionsDiv=document.getElementById('options');
    optionsDiv.innerHTML='';
    q.options.forEach((opt,i)=>{
        const btn=document.createElement('button');
        btn.innerText=opt;
        btn.onclick=()=>{myAnswer=i; socket.emit('submit_answer', i);}
        if(state.status==='QUESTION_RESULTS'){
            if(i===q.correctIndex) btn.style.background='green';
            else if(i===myAnswer) btn.style.background='red';
        }
        optionsDiv.appendChild(btn);
    });
    document.getElementById('timeLeft').innerText=state.timeLeft;
});
</script>
</body>
</html>
