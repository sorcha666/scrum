<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        .screen {
            display: none;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
        }

        .screen.active {
            display: flex;
        }

        /* ── OPTION BUTTONS ─────────────────────────── */
        .opt-btn {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            font-weight: 900;
            font-size: 2.8rem;
            color: white;
            border: none;
            outline: none;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .opt-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .opt-btn:hover::after {
            opacity: 1;
        }

        .opt-btn:active,
        .opt-btn.pressed {
            transform: translateY(8px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        .opt-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: translateY(8px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        .opt-btn.selected {
            opacity: 1 !important;
            outline: 5px solid rgba(255, 255, 255, 0.9);
            outline-offset: -3px;
            transform: translateY(8px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        /* Ripple effect on click */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 0.5s ease-out;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .opt-0 {
            background: linear-gradient(145deg, #f87171, #ef4444);
        }

        .opt-1 {
            background: linear-gradient(145deg, #60a5fa, #3b82f6);
        }

        .opt-2 {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
        }

        .opt-3 {
            background: linear-gradient(145deg, #4ade80, #22c55e);
        }

        /* ── STATUS HEADER ──────────────────────────── */
        .status-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        /* ── GLASS PANEL ────────────────────────────── */
        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* ── ANIMATIONS ─────────────────────────────── */
        @keyframes flash-green {

            0%,
            100% {
                background: linear-gradient(135deg, #1e293b, #0f172a);
            }

            50% {
                background: linear-gradient(135deg, #14532d, #16a34a);
            }
        }

        @keyframes flash-red {

            0%,
            100% {
                background: linear-gradient(135deg, #1e293b, #0f172a);
            }

            50% {
                background: linear-gradient(135deg, #7f1d1d, #dc2626);
            }
        }

        @keyframes bounce-in {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            60% {
                transform: scale(1.1);
            }

            80% {
                transform: scale(0.95);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes float-pts {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.5);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-10px);
            }

            40% {
                transform: translateX(10px);
            }

            60% {
                transform: translateX(-6px);
            }

            80% {
                transform: translateX(6px);
            }
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        @keyframes countdown-pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        .bounce-in {
            animation: bounce-in 0.5s cubic-bezier(0.175, .885, .32, 1.275) both;
        }

        .shake {
            animation: shake 0.5s ease both;
        }

        /* Score pop-up float */
        .score-popup {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 2.5rem;
            font-weight: 900;
            color: #4ade80;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            animation: float-pts 1.2s ease-out forwards;
        }

        /* Timer ring on question screen */
        #client-timer {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            margin-bottom: 0.5rem;
            transition: border-color 0.4s;
        }

        #client-timer.urgent {
            border-color: #ef4444;
            color: #ef4444;
            animation: countdown-pulse 0.5s infinite;
        }
    </style>
</head>

<body>
    <div class="status-header shadow-sm">
        <div class="text-white/80 font-bold text-sm">
            <i class="fa-solid fa-user text-blue-400 mr-1"></i>
            <span id="hdr-name">Guest</span>
        </div>
        <div class="text-white font-black text-lg"><span id="hdr-score">0</span> <span
                class="text-white/50 text-sm font-bold">pts</span></div>
    </div>

    <!-- JOIN SCREEN -->
    <div id="screen-join" class="screen active relative pt-16">
        <div class="glass-panel w-full max-w-sm p-8 flex flex-col items-center">
            <div class="text-6xl mb-4">🎮</div>
            <h1 class="text-3xl font-black mb-6 text-white">Ready to Play?</h1>
            <input type="text" id="player-name" placeholder="Enter your nickname..."
                class="w-full text-center text-xl p-4 bg-white/10 border-2 border-white/20 rounded-xl mb-4 focus:outline-none focus:border-blue-400 text-white placeholder-white/40"
                maxlength="15" autocomplete="off" />
            <button id="btn-join"
                class="w-full bg-blue-600 text-white p-4 rounded-xl font-black text-xl hover:bg-blue-500 active:scale-95 transition shadow-xl shadow-blue-900/50 disabled:opacity-50">
                <i class="fa-solid fa-play mr-2"></i> Join Game
            </button>
        </div>
    </div>

    <!-- WAITING SCREEN -->
    <div id="screen-waiting" class="screen pt-16">
        <div class="glass-panel w-full max-w-sm p-10 text-center">
            <div class="text-6xl mb-4 animate-bounce">👀</div>
            <h2 class="text-3xl font-black text-white mb-2">You're In!</h2>
            <p class="text-lg text-white/70 font-bold mb-6">Check the big screen!</p>
            <div class="flex gap-1 justify-center">
                <div class="w-2 h-2 rounded-full bg-blue-400 animate-bounce" style="animation-delay:0s"></div>
                <div class="w-2 h-2 rounded-full bg-blue-400 animate-bounce" style="animation-delay:0.1s"></div>
                <div class="w-2 h-2 rounded-full bg-blue-400 animate-bounce" style="animation-delay:0.2s"></div>
            </div>
        </div>
    </div>

    <!-- QUESTION SCREEN -->
    <div id="screen-question" class="screen pt-16">
        <div class="w-full max-w-md h-full flex flex-col justify-center gap-3">
            <div class="flex justify-between items-center mb-2 px-1">
                <p class="text-white/70 font-black text-sm uppercase tracking-widest">👆 Look at the screen!</p>
                <div id="client-timer">20</div>
            </div>
            <div class="grid grid-cols-2 gap-4 w-full h-[55vh] max-h-[380px]">
                <button class="opt-btn opt-0 flex items-center justify-center" onclick="submitAnswer(0)">A</button>
                <button class="opt-btn opt-1 flex items-center justify-center" onclick="submitAnswer(1)">B</button>
                <button class="opt-btn opt-2 flex items-center justify-center" onclick="submitAnswer(2)">C</button>
                <button class="opt-btn opt-3 flex items-center justify-center" onclick="submitAnswer(3)">D</button>
            </div>
            <p id="answer-status" class="mt-2 text-xl font-black text-white opacity-0 transition-opacity text-center">
                ✅ Locked in! Waiting for results...
            </p>
        </div>
    </div>

    <!-- FEEDBACK SCREEN -->
    <div id="screen-feedback" class="screen pt-16">
        <div class="glass-panel w-full max-w-sm p-10 flex flex-col items-center border-[6px] border-transparent"
            id="feedback-panel">
            <div id="feedback-icon-wrap" class="text-8xl mb-4">✅</div>
            <h2 class="text-4xl font-black mb-2 text-white" id="feedback-title">Correct!</h2>
            <div id="feedback-pts" class="text-2xl font-black text-white mt-2">+100</div>
        </div>
    </div>

    <!-- END SCREEN -->
    <div id="screen-end" class="screen pt-16">
        <div class="glass-panel w-full max-w-sm p-8 flex flex-col items-center">
            <div class="text-7xl mb-4">🏆</div>
            <h2 class="text-3xl font-black text-white mb-2">Game Over!</h2>
            <p class="text-white/60 font-bold mb-6">Check the big screen for the podium!</p>
            <div class="bg-white/10 px-8 py-4 rounded-xl w-full text-center">
                <p class="text-xs font-bold text-white/40 uppercase tracking-widest mb-1">Your Total Score</p>
                <p class="text-6xl font-black text-yellow-400 font-mono" id="final-score">0</p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ── AUDIO ENGINE (Web Audio API - no external files needed) ──
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let ctx;

        function getCtx() {
            if (!ctx) ctx = new AudioCtx();
            return ctx;
        }

        function playTone(freq, dur, type = 'sine', gainVal = 0.3) {
            try {
                const ac = getCtx();
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.connect(gain); gain.connect(ac.destination);
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ac.currentTime);
                gain.gain.setValueAtTime(gainVal, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
                osc.start(ac.currentTime);
                osc.stop(ac.currentTime + dur);
            } catch (e) { }
        }

        function playClickSound() {
            playTone(800, 0.08, 'square', 0.2);
        }

        function playCorrectSound() {
            // triumphant arpeggio
            [523, 659, 784, 1047].forEach((f, i) => {
                setTimeout(() => playTone(f, 0.25, 'sine', 0.4), i * 100);
            });
        }

        function playWrongSound() {
            playTone(180, 0.4, 'sawtooth', 0.35);
            setTimeout(() => playTone(140, 0.4, 'sawtooth', 0.3), 150);
        }

        function playCountdownBeep() {
            playTone(660, 0.1, 'square', 0.15);
        }

        // ── STATE ────────────────────────────────────────
        const socket = io();
        let myName = 'Guest';
        let myScore = 0;
        let myAnswer = null;
        let hasAnswered = false;
        let lastTimeLeft = 20;

        const screens = {
            'JOIN': document.getElementById('screen-join'),
            'LOBBY': document.getElementById('screen-waiting'),
            'QUESTION_ACTIVE': document.getElementById('screen-question'),
            'QUESTION_RESULTS': document.getElementById('screen-feedback'),
            'LEADERBOARD': document.getElementById('screen-waiting'),
            'END': document.getElementById('screen-end')
        };

        function switchScreen(id) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            if (screens[id]) screens[id].classList.add('active');
        }

        // ── RIPPLE EFFECT ─────────────────────────────────
        function addRipple(btn, e) {
            const r = document.createElement('span');
            r.className = 'ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            r.style.width = r.style.height = size + 'px';
            r.style.left = (e.clientX - rect.left - size / 2) + 'px';
            r.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(r);
            setTimeout(() => r.remove(), 600);
        }

        // ── SCORE POPUP ───────────────────────────────────
        function showScorePopup(pts) {
            const el = document.createElement('div');
            el.className = 'score-popup';
            el.innerText = '+' + pts;
            el.style.left = (window.innerWidth / 2 - 40) + 'px';
            el.style.top = (window.innerHeight / 2) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1400);
        }

        // ── JOIN ──────────────────────────────────────────
        document.getElementById('btn-join').addEventListener('click', () => {
            const input = document.getElementById('player-name').value.trim();
            if (input.length > 0) {
                playClickSound();
                myName = input;
                document.getElementById('hdr-name').innerText = myName;
                document.getElementById('btn-join').innerText = 'Joining...';
                document.getElementById('btn-join').disabled = true;
                socket.emit('join_game', myName);
            }
        });

        // ── STATE UPDATE ──────────────────────────────────
        socket.on('state_update', (state) => {
            // Handle lobby transition
            if (document.getElementById('screen-join').classList.contains('active') && state.status === 'LOBBY') {
                if (document.getElementById('btn-join').disabled) {
                    switchScreen('LOBBY');
                }
                return;
            }

            // Sync score
            const me = state.leaderboard.find(p => p.name === myName);
            if (me) {
                const diff = me.score - myScore;
                if (diff > 0) window.lastPtsGained = diff;
                myScore = me.score;
                document.getElementById('hdr-score').innerText = myScore;
                document.getElementById('final-score').innerText = myScore;

                // Show feedback content whenever we enter RESULTS
                if (state.status === 'QUESTION_RESULTS') {
                    showFeedback(state);
                }
            }

            // Screen routing
            if (state.status === 'QUESTION_ACTIVE') {
                if (!document.getElementById('screen-question').classList.contains('active')) {
                    hasAnswered = false;
                    myAnswer = null;
                    document.querySelectorAll('.opt-btn').forEach(b => {
                        b.classList.remove('disabled', 'selected');
                        b.style.opacity = '';
                    });
                    document.getElementById('answer-status').style.opacity = '0';
                    switchScreen('QUESTION_ACTIVE');
                }
                // Update client timer
                const t = state.timeLeft;
                const timerEl = document.getElementById('client-timer');
                timerEl.innerText = t;
                if (t !== lastTimeLeft && t <= 5 && t > 0) {
                    playCountdownBeep();
                }
                if (t <= 5) timerEl.classList.add('urgent');
                else timerEl.classList.remove('urgent');
                lastTimeLeft = t;
            } else if (state.status === 'QUESTION_RESULTS') {
                switchScreen('QUESTION_RESULTS');
            } else if (state.status === 'LEADERBOARD') {
                switchScreen('LEADERBOARD');
            } else if (state.status === 'END') {
                switchScreen('END');
                // Shoot confetti on end screen for everyone
                setTimeout(() => {
                    confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 } });
                }, 300);
            }
        });

        function showFeedback(state) {
            const panel = document.getElementById('feedback-panel');
            const wrap = document.getElementById('feedback-icon-wrap');
            const title = document.getElementById('feedback-title');
            const pts = document.getElementById('feedback-pts');

            const isCorrect = (myAnswer !== null && state.question && myAnswer === state.question.correctIndex);

            // Remove previous bounce to re-trigger
            wrap.classList.remove('bounce-in');
            panel.classList.remove('shake');
            void wrap.offsetWidth; // reflow

            if (isCorrect) {
                // 🎉 CORRECT
                panel.className = 'glass-panel w-full max-w-sm p-10 flex flex-col items-center border-[6px] border-green-400';
                panel.style.background = 'rgba(20,83,45,0.7)';
                wrap.innerText = '🎉';
                wrap.classList.add('bounce-in');
                title.className = 'text-5xl font-black mb-2 text-green-300';
                title.innerText = 'Correct!';
                const gained = window.lastPtsGained || 100;
                pts.className = 'text-2xl font-black text-yellow-300 bg-yellow-900/40 px-6 py-2 rounded-full';
                pts.innerText = `+${gained} points!`;

                // Sounds
                playCorrectSound();
                // Screen flash green
                document.body.style.animation = 'none';
                void document.body.offsetWidth;
                document.body.style.animation = 'flash-green 0.6s ease';

                // Confetti burst from bottom
                setTimeout(() => {
                    confetti({ particleCount: 80, spread: 70, origin: { y: 1.0 }, startVelocity: 55 });
                }, 100);

                // Floating score popup
                showScorePopup(gained);

            } else if (hasAnswered) {
                // ❌ WRONG
                panel.className = 'glass-panel w-full max-w-sm p-10 flex flex-col items-center border-[6px] border-red-500';
                panel.style.background = 'rgba(127,29,29,0.7)';
                wrap.innerText = '❌';
                wrap.classList.add('bounce-in');
                panel.classList.add('shake');
                title.className = 'text-5xl font-black mb-2 text-red-300';
                title.innerText = 'Wrong!';
                pts.className = 'text-lg font-bold text-white/60 mt-2';

                let correctText = 'Check the host screen';
                if (state.question && state.question.correctIndex !== null) {
                    correctText = state.question.options[state.question.correctIndex];
                }
                pts.innerHTML = `<span class="text-xs uppercase tracking-widest text-red-400 block mb-2">Correct Answer</span><span class="text-xl px-4 py-2 bg-white/10 rounded-xl inline-block border border-red-500/40 text-white">${correctText}</span>`;

                // Sounds
                playWrongSound();
                // Screen flash red
                document.body.style.animation = 'none';
                void document.body.offsetWidth;
                document.body.style.animation = 'flash-red 0.6s ease';

            } else {
                // ⏰ TIME'S UP
                panel.className = 'glass-panel w-full max-w-sm p-10 flex flex-col items-center border-[6px] border-white/20';
                panel.style.background = 'rgba(30,41,59,0.9)';
                wrap.innerText = '⏰';
                wrap.classList.add('bounce-in');
                title.className = 'text-4xl font-black mb-2 text-white/60';
                title.innerText = "Time's Up!";
                pts.className = 'text-lg font-bold text-white/40 mt-2';
                pts.innerText = '+0';
                playWrongSound();
            }
        }

        // ── ANSWER RECEIVED ───────────────────────────────
        socket.on('answer_received', () => {
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.add('disabled'));
            document.getElementById('answer-status').style.opacity = '1';
        });

        // ── SUBMIT ANSWER ─────────────────────────────────
        function submitAnswer(index) {
            if (!hasAnswered) {
                hasAnswered = true;
                myAnswer = index;
                socket.emit('submit_answer', index);
                playClickSound();

                document.querySelectorAll('.opt-btn').forEach((b, i) => {
                    if (i === index) {
                        b.classList.add('selected');
                    } else {
                        b.classList.add('disabled');
                    }
                });
            }
        }

        // Attach ripple to buttons
        document.querySelectorAll('.opt-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                addRipple(this, e);
            });
        });
    </script>
</body>

</html>
